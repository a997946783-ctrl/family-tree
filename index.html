<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f7f3ed;--paper:#fffdf9;--paper-alt:#faf8f4;--red:#7a1e1e;--red-mid:#9b3030;--red-light:#b85050;--gold:#8b6914;--gold-light:#c4993d;--gold-faint:rgba(139,105,20,.06);--ink:#1a1714;--ink-soft:#3d3935;--sub:#78716c;--sub-light:#a8a29e;--border:#ddd7cc;--line:#eae6de;--line-light:#f2f0ea;--shadow-sm:0 1px 3px rgba(28,25,23,.06);--shadow-md:0 4px 12px rgba(28,25,23,.08),0 1px 3px rgba(28,25,23,.04);--shadow-lg:0 8px 28px rgba(28,25,23,.1),0 2px 8px rgba(28,25,23,.04);--shadow-xl:0 20px 50px rgba(28,25,23,.12);--radius:6px;--radius-md:10px;--radius-lg:14px;--ease:cubic-bezier(.22,1,.36,1);--blue:#3b82f6;--pink:#ec4899;--tree-line:#c9bfa8}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:"Noto Serif SC","PingFang SC","Microsoft YaHei","Noto Sans SC",serif;background:var(--bg);background-image:radial-gradient(circle at 20% 80%,rgba(139,105,20,.03) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(122,30,30,.03) 0%,transparent 50%);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
::selection{background:rgba(122,30,30,.15);color:var(--red)}
.topbar{background:linear-gradient(135deg,#5c1515 0%,var(--red) 40%,#8b2525 100%);color:#fff;display:flex;align-items:center;position:sticky;top:0;z-index:100;height:52px;box-shadow:0 2px 12px rgba(92,21,21,.3);border-bottom:1px solid rgba(255,255,255,.08)}
.topbar h1{font-family:"Noto Serif SC","SimSun",serif;font-size:1.15rem;font-weight:700;padding:0 24px;letter-spacing:.4em;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.topbar .spacer{flex:1}
.search-box{margin-right:8px}.search-box input{padding:6px 12px;border:1px solid rgba(255,255,255,.2);border-radius:20px;background:rgba(255,255,255,.12);color:#fff;font-size:.8rem;width:160px;transition:all .3s var(--ease);font-family:inherit}.search-box input::placeholder{color:rgba(255,255,255,.5)}.search-box input:focus{outline:none;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.2);width:220px}
.topbar .actions{display:flex;gap:2px;padding-right:16px}

.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px);height:calc(100dvh - 52px)}
.tree-panel{flex:1;overflow:auto;overflow-x:auto;padding:30px 20px;background:var(--bg);background-image:radial-gradient(circle at 50% 0%,rgba(139,105,20,.04) 0%,transparent 60%)}
.side-panel{width:400px;border-left:1px solid var(--border);background:var(--paper);overflow-y:auto;display:flex;flex-direction:column;transition:width .35s var(--ease);box-shadow:-4px 0 20px rgba(0,0,0,.04)}

.tree-children>.tree-branch:first-child::after{left:50%;right:0}
.tree-children>.tree-branch:last-child::after{left:0;right:50%}
.tree-children>.tree-branch:first-child:last-child::after{display:none}
.tree-children>.tree-branch:not(:first-child):not(:last-child)::after{left:0;right:0}
.node{padding:10px 16px;border:1.5px solid var(--border);border-radius:var(--radius-md);background:linear-gradient(180deg,var(--paper) 0%,var(--paper-alt) 100%);text-align:center;cursor:pointer;transition:all .25s var(--ease);min-width:90px;max-width:180px;position:relative;box-shadow:var(--shadow-sm);user-select:none}

.node:hover .quick-add{display:flex}
.node .quick-add:hover{transform:translateX(-50%) scale(1.15)}
.collapse-toggle{position:absolute;top:-8px;right:-8px;width:18px;height:18px;border-radius:50%;background:var(--gold);color:#fff;border:2px solid var(--paper);font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;box-shadow:0 1px 4px rgba(139,105,20,.3);line-height:1;padding:0;transition:all .2s}

.panel-header .close-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--sub-light);padding:4px 8px;border-radius:var(--radius);transition:all .2s}

.panel-body{flex:1;overflow-y:auto;padding:24px}

.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

.btn-primary{background:linear-gradient(135deg,var(--red),var(--red-mid));color:#fff;box-shadow:0 2px 8px rgba(122,30,30,.2)}.btn-primary:hover{box-shadow:0 4px 14px rgba(122,30,30,.3)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#fff;box-shadow:0 2px 8px rgba(139,105,20,.2)}.btn-gold:hover{box-shadow:0 4px 14px rgba(139,105,20,.3)}
.btn-ghost{background:var(--paper);color:var(--ink-soft);border:1px solid var(--border)}.btn-ghost:hover{background:#fff;border-color:var(--sub-light)}
.btn-danger{background:transparent;color:var(--sub-light);border:1px solid transparent}.btn-danger:hover{color:var(--red-light);background:rgba(122,30,30,.06)}
.btn-sm{padding:6px 12px;font-size:.75rem}
.detail-table{width:100%;font-size:.85rem;border-collapse:separate;border-spacing:0}
.detail-table td{padding:10px 8px;border-bottom:1px solid var(--line-light);vertical-align:top}
.detail-table td:first-child{color:var(--sub);width:60px;font-weight:600;font-size:.78rem;letter-spacing:.06em}
.detail-table tr:last-child td{border-bottom:none}
.detail-table a{color:var(--red);text-decoration:none;border-bottom:1px solid rgba(122,30,30,.2);transition:all .2s}
.detail-table a:hover{border-bottom-color:var(--red)}
.detail-actions{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
.record-block{margin-bottom:20px;padding:16px 20px;border-left:3px solid var(--gold-light);background:linear-gradient(135deg,var(--gold-faint) 0%,rgba(255,253,249,.5) 100%);border-radius:0 var(--radius-md) var(--radius-md) 0;box-shadow:var(--shadow-sm)}
.record-block .rec-name{font-family:"Noto Serif SC","SimSun",serif;font-weight:700;color:var(--red);margin-bottom:8px;font-size:1rem;letter-spacing:.08em}
.record-block .rec-text{text-indent:2em;line-height:2;color:var(--ink-soft);font-size:.85rem}
.record-block .rec-note{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);font-size:.78rem;color:var(--sub);text-indent:2em}
.event-item{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--line-light);font-size:.85rem}
.event-item:last-child{border-bottom:none}
.event-date{font-weight:700;color:var(--red);min-width:64px;font-size:.82rem}
.tpl-card{padding:16px;border:1.5px solid var(--border);border-radius:var(--radius-md);cursor:pointer;text-align:center;transition:all .25s var(--ease);background:var(--paper-alt)}.tpl-card:hover{border-color:var(--red-light);box-shadow:var(--shadow-md);transform:translateY(-2px)}.tpl-icon{font-size:1.8rem;margin-bottom:6px}.tpl-name{font-weight:700;font-size:.88rem;color:var(--ink);margin-bottom:4px}.tpl-desc{font-size:.72rem;color:var(--sub)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 28px;border-radius:var(--radius-md);font-size:.85rem;z-index:999;opacity:0;transition:all .3s var(--ease);pointer-events:none;box-shadow:var(--shadow-lg);letter-spacing:.02em}
.toast.show{opacity:1}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,23,20,.45);backdrop-filter:blur(8px);z-index:200;justify-content:center;align-items:center}
.modal-bg.show{display:flex}
.modal{background:var(--paper);padding:32px;border-radius:var(--radius-lg);max-width:560px;width:92%;max-height:80vh;overflow-y:auto;position:relative;box-shadow:var(--shadow-xl);animation:modalIn .35s var(--ease)}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.modal h3{font-family:"Noto Serif SC","SimSun",serif;color:var(--red);margin-bottom:20px;text-align:center;font-size:1.15rem;letter-spacing:.15em}
.modal .close-btn{position:absolute;top:14px;right:18px;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--sub-light);transition:color .2s}
.modal .close-btn:hover{color:var(--red)}
.llm-fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-mid));color:#fff;border:none;cursor:pointer;font-size:1.4rem;box-shadow:var(--shadow-lg);z-index:140;transition:all .2s var(--ease);display:flex;align-items:center;justify-content:center}
.llm-fab:hover{transform:scale(1.08)}.llm-fab.hide{display:none}
.llm-panel{position:fixed;bottom:20px;right:20px;width:400px;max-height:600px;background:var(--paper);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-xl);z-index:150;display:none;flex-direction:column;overflow:hidden}
.llm-panel.show{display:flex;animation:modalIn .3s var(--ease)}
.llm-header{padding:12px 16px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:.88rem}

.llm-psel option{color:var(--ink);background:var(--paper)}
.llm-body{flex:1;overflow-y:auto;padding:14px;min-height:200px;max-height:380px}
.llm-msg{margin-bottom:10px;padding:8px 12px;border-radius:var(--radius-md);font-size:.84rem;line-height:1.6;white-space:pre-wrap}
.llm-msg.user{background:rgba(107,29,29,.06);margin-left:20px}
.llm-msg.ai{background:var(--paper-alt);margin-right:20px}
.llm-input{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line)}
.llm-input textarea{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:.82rem;resize:none;height:36px;font-family:inherit}
.llm-input textarea:focus{outline:none;border-color:var(--red-mid)}
.llm-input button{padding:8px 14px;background:var(--red);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:.82rem;transition:opacity .2s}
.llm-input button:disabled{opacity:.5;cursor:not-allowed}
.s-section{margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.s-section:last-child{border-bottom:none}
.s-section h4{font-size:.88rem;color:var(--red);margin-bottom:10px;font-weight:600}
.s-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.s-row label{min-width:70px;font-size:.8rem;color:var(--sub)}
.s-row input,.s-row select{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:.82rem;font-family:inherit}
.s-row input:focus,.s-row select:focus{outline:none;border-color:var(--red-mid)}
.tp{background:var(--paper-alt);border-left:2px solid var(--gold-light);padding:10px 14px;margin:10px 0;font-size:.82rem;color:var(--sub);border-radius:0 var(--radius) var(--radius) 0}
@media(max-width:900px){
  .topbar{height:48px}
  .topbar h1{font-size:.95rem;letter-spacing:.15em;padding:0 12px}
  .topbar .actions{display:none}

  .topbar .actions.show button{padding:12px 16px;text-align:left;border-bottom:1px solid var(--line-light);font-size:.85rem}
  .topbar .actions.show button:last-child{border-bottom:none}
  .menu-btn{display:flex!important}
  .search-box{margin-right:4px}.search-box input{width:80px;font-size:.75rem;padding:5px 8px}
  .app{flex-direction:column}
  .tree-panel{flex:1;overflow:auto;padding:12px;touch-action:none}
  .tree-container{transform-origin:0 0;min-width:fit-content}
  .side-panel{width:100%!important;max-height:55vh;border-left:none;border-top:1px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.06);position:relative}
  .side-panel.collapsed{max-height:0;border:none}
  .node{padding:8px 12px;min-width:60px;max-width:120px}
  .node .name{font-size:.8rem}
  .node .node-gen{font-size:.5rem}
  .node .info{font-size:.6rem}
  .spouse-line{width:12px}
  .llm-panel{width:calc(100vw - 16px);right:8px;bottom:8px;max-height:70vh}
  .llm-body{max-height:45vh}
  .modal{padding:16px;max-height:92vh;width:96%}
  .tpl-card{padding:12px}
  .tpl-icon{font-size:1.4rem}
  .zoom-controls{display:flex!important}
}
.zoom-controls{display:none;position:fixed;bottom:80px;right:16px;flex-direction:column;gap:6px;z-index:130}
.zoom-controls button{width:40px;height:40px;border-radius:50%;background:var(--paper);border:1.5px solid var(--border);font-size:1.2rem;cursor:pointer;box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center}
.menu-btn{display:none;background:none;border:none;color:rgba(255,255,255,.7);font-size:1.3rem;padding:8px;cursor:pointer}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff!important;font-size:12pt}
  .topbar,.llm-panel,.llm-fab,.side-panel,.btn-row,.quick-add{display:none!important}
  .app{display:block!important;height:auto!important;overflow:visible!important}
  .tree-panel{padding:0!important;overflow:visible!important;background:#fff!important}
  .tree-container{margin:0 auto}
  .node{box-shadow:none!important;border:1.5px solid #999!important;background:#fff!important;transform:none!important;padding:8px 14px;page-break-inside:avoid}
  .node.male{border-left:3px solid #555!important}
  .node.female{border-left:3px solid #c77!important}
  .node .name{font-size:11pt;color:#000!important}
  .node .info{font-size:9pt;color:#555!important}
  .spouse-line{background:#999!important;opacity:1!important}
  .children-line,.children-row::before,.children-row>.family-unit::before{background:#bbb!important}
  .family-unit{page-break-inside:avoid}
  @page{margin:1.5cm;size:A4 portrait}
  .print-title{display:block!important;text-align:center;font-family:"Noto Serif SC","SimSun",serif;font-size:18pt;font-weight:700;letter-spacing:.3em;color:#000;margin-bottom:8px;padding-bottom:8px;border-bottom:2px solid #333}
  .print-subtitle{display:block!important;text-align:center;font-size:10pt;color:#666;margin-bottom:24px;letter-spacing:.1em}
}
.print-title,.print-subtitle{display:none}
.ic{display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;vertical-align:-0.125em;line-height:1}.ic svg{width:1em;height:1em;flex-shrink:0}.dot{display:inline-block;width:.6em;height:.6em;border-radius:50%;vertical-align:0em;margin:0 .15em}
</style>

0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span></button></div></div>

<script>// ==================== Data ====================
var D=loadData();
function defaultData(){return{set:{fm:"",hl:"",tt:"е®¶и°ұ",wd:"",pr:""},mem:[],ev:[],llm:{provider:"deepseek",keys:{},urls:{},models:{}}}}
function loadData(){try{var s=localStorage.getItem('ft');return s?JSON.parse(s):defaultData()}catch(e){return defaultData()}}
var _saveTimer=null;
function saveData(){if(_saveTimer)clearTimeout(_saveTimer);_saveTimer=setTimeout(function(){localStorage.setItem('ft',JSON.stringify(D));autoSaveFile()},300)}

// ==================== File Sync ====================
var _fileHandle=null;
var _fileWritable=false;

async function pickSaveFile(){
  if(!window.showSaveFilePicker){toast('жөҸи§ҲеҷЁдёҚж”ҜжҢҒпјҢиҜ·з”Ё Chrome/Edge');return}
  try{
    _fileHandle=await window.showSaveFilePicker({suggestedName:'е®¶и°ұж•°жҚ®.json',types:[{description:'JSON',accept:{'application/json':['.json']}}]});
    _fileWritable=true;
    D.set._syncFile=true;
    saveDataRaw();
    toast('<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span> е·Іе…іиҒ”ж–Үд»¶пјҢеҗҺз»ӯдҝ®ж”№иҮӘеҠЁдҝқеӯҳ');
    updateSyncStatus();
  }catch(e){/* cancelled */}
}

async function saveDataRaw(){
  if(!_fileHandle||!_fileWritable)return;
  try{
    var w=await _fileHandle.createWritable();
    await w.write(JSON.stringify(D,null,2));
    await w.close();
  }catch(e){_fileWritable=false;console.error('auto-save failed:',e)}
}

async function autoSaveFile(){
  if(!_fileHandle||!_fileWritable)return;
  try{await saveDataRaw()}catch(e){}
}

async function restoreFileHandle(){
  if(!D.set._syncFile)return;
  // Try to re-request permission on page load
  if(!window.showSaveFilePicker)return;
  try{
    // Use accept to re-pick
    _fileHandle=await window.showSaveFilePicker({suggestedName:'е®¶и°ұж•°жҚ®.json',types:[{description:'JSON',accept:{'application/json':['.json']}}]});
    _fileWritable=true;
    updateSyncStatus();
  }catch(e){/* user cancelled */}
}

function updateSyncStatus(){
  var el=document.getElementById('syncBadge');
  if(!el)return;
  if(_fileWritable)el.innerHTML='<span class="dot" style="background:#22c55e"></span> е·ІеҗҢжӯҘ';
  else if(D.set._syncFile)el.innerHTML='<span class="dot" style="background:#eab308"></span> еҫ…иҝһжҺҘ';
  else el.textContent='';
}

function pickImportFile(){
  var inp=document.getElementById('importFileInput');
  if(inp)inp.click();
}

function handleImportFile(el){
  var f=el.files[0];if(!f)return;el.value='';
  var r=new FileReader();
  r.onload=function(){
    try{
      var d=JSON.parse(r.result);
      if(d.mem&&d.set){
        D=d;
        saveDataRaw();
        renderTree();closeSidePanel();
        toast('<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span> е·ІеҜје…Ҙ '+D.mem.length+' дәә');
      }else toast('ж јејҸй”ҷиҜҜпјҡдёҚжҳҜе®¶и°ұж–Үд»¶');
    }catch(e){toast('и§ЈжһҗеӨұиҙҘ: '+e.message)}
  };
  r.readAsText(f);
}

// ==================== Word/TXT Import ====================
async function handleImportDoc(el){
  var f=el.files[0];if(!f)return;el.value='';
  var text='';
  try{
    if(f.name.endsWith('.docx')){
      if(typeof mammoth==='undefined'){
        toast('жӯЈеңЁеҠ иҪҪи§Јжһҗз»„д»¶...');
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js');
      }
      var buf=await f.arrayBuffer();
      var r=await mammoth.extractRawText({arrayBuffer:buf});
      text=r.value;
    }else if(f.name.endsWith('.pdf')){
      text=await parsePDF(f);
    }else{
      text=await f.text();
    }
  }catch(e){toast('и§ЈжһҗеӨұиҙҘ: '+e.message);return}
  if(!text.trim()){toast('ж–ҮжЎЈеҶ…е®№дёәз©ә');return}
  showDocImportModal(text,f.name);
}

function showDocImportModal(text,fileName){
  var parsed=parseGenealogyText(text);
  var h='<h3><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span> еҜје…Ҙж–ҮжЎЈ</h3>';
  h+='<p style="color:var(--sub);font-size:.82rem;margin-bottom:12px">ж–Үд»¶: '+esc(fileName)+' ('+text.length+'еӯ—)</p>';
  if(parsed.length){
    h+='<p style="color:var(--red);font-weight:600;margin-bottom:10px"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg></span> иҜҶеҲ«еҲ° '+parsed.length+' дҪҚжҲҗе‘ҳпјҡ</p>';
    h+='<div style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;margin-bottom:16px;background:var(--paper-alt)">';
    parsed.forEach(function(p,i){
      h+='<div style="padding:6px 0;'+(i>0?'border-top:1px solid var(--line-light);':'')+'">';
      h+='<b>'+esc(p.name)+'</b>';
      if(p.cy)h+=' еӯ—'+esc(p.cy);
      h+=' <span style="color:var(--sub);font-size:.78rem">'+(p.g==='male'?'з”·':'еҘі')+' В· з¬¬'+p.gen+'дё–</span>';
      if(p.bi)h+=' <span style="color:var(--sub);font-size:.78rem">з”ҹ'+p.bi+'</span>';
      if(p.fa)h+=' <span style="color:var(--sub);font-size:.78rem">зҲ¶:'+esc(p.fa)+'</span>';
      if(p.mo)h+=' <span style="color:var(--sub);font-size:.78rem">жҜҚ:'+esc(p.mo)+'</span>';
      if(p.spName)h+=' <span style="color:var(--sub);font-size:.78rem">й…Қ:'+esc(p.spName)+'</span>';
      h+='</div>';
    });
    h+='</div>';
    h+='<div class="btn-row" style="justify-content:center">';
    h+='<button class="btn btn-primary" onclick="importParsedMembers()"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span> еҜје…Ҙиҝҷ '+parsed.length+' дәә</button>';
    h+='<button class="btn btn-ghost" onclick="closeModal()">еҸ–ж¶Ҳ</button>';
    h+='</div>';
  }else{
    h+='<p style="color:var(--sub);margin-bottom:12px">жңӘиҜҶеҲ«еҲ°жҲҗе‘ҳж•°жҚ®гҖӮж–ҮжЎЈеҺҹж–Үпјҡ</p>';
    h+='<div style="max-height:400px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;font-size:.85rem;line-height:1.9;white-space:pre-wrap;background:var(--paper-alt)">'+esc(text.substring(0,5000))+'</div>';
    h+='<div class="btn-row" style="justify-content:center;margin-top:12px">';
    h+='<button class="btn btn-ghost" onclick="closeModal()">е…ій—ӯ</button>';
    h+='</div>';
  }
  document.getElementById('modalBody').innerHTML=h;
  openModal();
}

var _parsedMembers=[];
function importParsedMembers(){
  if(!_parsedMembers.length){toast('жІЎжңүеҸҜеҜје…Ҙзҡ„ж•°жҚ®');return}
  // Check for duplicates
  var existingNames={};
  D.mem.forEach(function(m){existingNames[m.name]=true});
  var newMembers=_parsedMembers.filter(function(m){return !existingNames[m.name]});
  var skipCount=_parsedMembers.length-newMembers.length;
  if(!newMembers.length){toast('жүҖжңүжҲҗе‘ҳе·ІеӯҳеңЁпјҢж— йңҖеҜје…Ҙ');return}
  // First pass: add all members and get IDs
  var nameToId={};
  newMembers.forEach(function(m){
    m.id=nId();
    nameToId[m.name]=m.id;
    D.mem.push(m);
  });
  // Second pass: resolve parent references
  newMembers.forEach(function(m){
    if(m.fa&&typeof m.fa==='string'){
      var faId=nameToId[m.fa]||null;
      if(!faId){var fa=D.mem.find(function(x){return x.name===m.fa});if(fa)faId=fa.id}
      m.fa=faId;
    }
    if(m.mo&&typeof m.mo==='string'){
      var moId=nameToId[m.mo]||null;
      if(!moId){var mo=D.mem.find(function(x){return x.name===m.mo});if(mo)moId=mo.id}
      m.mo=moId;
    }
    // Link spouse by name
    if(m.spName){
      var sp=D.mem.find(function(x){return x.name===m.spName});
      if(sp){m.sp=[sp.id];if(sp.sp.indexOf(m.id)<0)sp.sp.push(m.id)}
    }
  });
  saveData();renderTree();closeModal();
  var msg='<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span> е·ІеҜје…Ҙ '+newMembers.length+' дәә';
  if(skipCount)msg+='пјҲи·іиҝҮ '+skipCount+' жқЎйҮҚеӨҚпјү';
  toast(msg);
}

function parseGenealogyText(text){
  var members=[];
  var lines=text.split(/\n+/);
  var currentGen=1;
  
  function cnNum(s){
    var map={'дёҖ':1,'дәҢ':2,'дёү':3,'еӣӣ':4,'дә”':5,'е…ӯ':6,'дёғ':7,'е…«':8,'д№қ':9,'еҚҒ':10,'еҚҒдёҖ':11,'еҚҒдәҢ':12,'еҚҒдёү':13,'еҚҒеӣӣ':14,'еҚҒдә”':15,'еҚҒе…ӯ':16,'еҚҒдёғ':17,'еҚҒе…«':18,'еҚҒд№қ':19,'дәҢеҚҒ':20};
    return map[s]||parseInt(s)||0;
  }
  
  // Clean notes in parentheses: пјҲиҝҮз»§иғһеҸ”пјүпјҲеҸҢзҘ§пјүпјҲеҸҲеҗҚXXпјүпјҲе°‘йҖқпјү
  function cleanName(s){
    return s.replace(/[пјҲ(][^пјү)]*[пјү)]/g,'').trim();
  }
  
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line)continue;
    
    // Detect generation: еҚҒдәҢд»ЈзҘ–пјҲжҖҖеӯ—жҙҫпјү/ еҚҒдёғд»ЈпјҲеҫ·еӯ—жҙҫпјү
    var genMatch=line.match(/(еҚҒ[дёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қ]?|[дёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қ]+)д»Ј/);
    if(genMatch){currentGen=cnNum(genMatch[1]);continue}
    if(line.indexOf('е§ӢзҘ–')>=0){currentGen=1;continue}
    
    // Skip branch headers
    if(line.match(/еҗҺ\s*[\u4e00-\u9fff]+дёҖж”Ҝ/))continue;
    if(line.match(/е…ғйЎә[еүҚеҗҺ]/))continue;
    
    // Person: й«ҳXXX ... (handle spaces: й«ҳ  дә” -> й«ҳдә”)
    var personMatch=line.match(/й«ҳ\s*([\u4e00-\u9fff]{1,6})\s*(.*)/);
    if(!personMatch)continue;
    
    var name=cleanName(personMatch[1].trim());
    if(!name||name.length<1)continue;
    var rest=personMatch[2].trim();
    var m={name:name,cy:'',g:'male',gen:currentGen,bi:'',de:'',bu:'',fa:null,mo:null,sp:[],od:null,ph:'',nt:''};
    
    // Wife: еЁ¶XXж°ҸдёәеҰ» / еЁ¶XXдёәеҰ»(full name) / иҒҡXXдёәеҰ»(typo) / еӨҡеҰ»
    var wifeMatch=rest.match(/[еЁ¶иҒҡ]([\u4e00-\u9fff]{2,6})(?:ж°Ҹ|дёәеҰ»)/);
    if(wifeMatch){
      var wn=wifeMatch[1].trim();
      if(wn.length>=2)m.spName=wn;
    }
    
    // Check ж— еҗҺ / ж— иҖғ / е°‘йҖқ
    var noChild=rest.indexOf('ж— еҗҺ')>=0||rest.indexOf('ж— иҖғ')>=0||rest.indexOf('е°‘йҖқ')>=0;
    
    // Children: з”ҹXеӯҗXеҘі / з”ҹе…»XеӯҗXеҘі / з”ҹXеӯҗ / з”ҹXеҘі
    var chMatch=rest.match(/з”ҹ(?:е…»)?[дёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қеҚҒ]еӯҗ(?:[дёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қеҚҒ]еҘі)?[пјҡ:](.+?)(?:[гҖӮ]|$)/);
    var sons=[],daughters=[];
    if(chMatch){
      var chStr=chMatch[1];
      // Get married names from full text
      var marriedNames=[];
      var marryRegex=/([\u4e00-\u9fff]{1,4})е«Ғ/g;
      var mm;
      while((mm=marryRegex.exec(rest))!==null)marriedNames.push(mm[1]);
      var parts=chStr.split(/[гҖҒпјҢ,]/);
      parts.forEach(function(p){
        p=cleanName(p.trim());
        if(!p||p.length<1)return;
        if(p.match(/з”ҹ|еҘі|ж— еҗҺ|ж— иҖғ|е°‘йҖқ|иҝҮз»§|еҸҢзҘ§|еҸҲеҗҚ/))return;
        if(marriedNames.indexOf(p)>=0){
          daughters.push(p);
        }else{
          sons.push(p);
        }
      });
    }
    
    // Daughter only: з”ҹXеҘіпјҡname
    if(!daughters.length){
      var dgOnly=rest.match(/з”ҹ(?:е…»)?[дёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қеҚҒ]еҘі[пјҡ:](.+?)(?:[гҖӮ]|$)/);
      if(dgOnly){
        var dgParts=dgOnly[1].split(/[гҖҒпјҢ,]/);
        dgParts.forEach(function(p){
          p=cleanName(p.trim());
          if(p&&p.length>=1)daughters.push(p);
        });
      }
    }
    
    // Adopted: е—ЈдёҖеӯҗпјҡXXX
    var adoptMatch=rest.match(/е—Ј[дёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қеҚҒ]еӯҗ[пјҡ:]([\u4e00-\u9fff]+)/);
    if(adoptMatch)sons.push(cleanName(adoptMatch[1]));
    
    // Fostered: е…»XеӯҗпјҡXXX / е…»дёҖеӯҗпјҡXXX
    var fosterMatch=rest.match(/е…»[дёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қеҚҒ]еӯҗ[пјҡ:]([\u4e00-\u9fffпјҢгҖҒ]+)/);
    if(fosterMatch){
      fosterMatch[1].split(/[гҖҒпјҢ,]/).forEach(function(s){
        s=cleanName(s.trim());
        if(s&&s.length>=1)sons.push(s);
      });
    }
    
    members.push(m);
    
    // Add children
    sons.forEach(function(sn,idx){
      if(sn.length<1)return;
      members.push({name:sn,cy:'',g:'male',gen:currentGen+1,bi:'',de:'',bu:'',fa:name,mo:m.spName||null,sp:[],od:idx+1,ph:'',nt:''});
    });
    daughters.forEach(function(dg,idx){
      if(dg.length<1)return;
      members.push({name:dg,cy:'',g:'female',gen:currentGen+1,bi:'',de:'',bu:'',fa:name,mo:m.spName||null,sp:[],od:sons.length+idx+1,ph:'',nt:''});
    });
  }
  
  _parsedMembers=members;
  // Deduplicate: merge entries with same name, keep one with more info
  var deduped={};
  members.forEach(function(m){
    if(!deduped[m.name]){
      deduped[m.name]=m;
    }else{
      var existing=deduped[m.name];
      // Keep the one with more info (spouse, parents)
      if(!existing.spName&&m.spName)existing.spName=m.spName;
      if(!existing.fa&&m.fa)existing.fa=m.fa;
      if(!existing.mo&&m.mo)existing.mo=m.mo;
    }
  });
  var result=[];
  Object.keys(deduped).forEach(function(k){result.push(deduped[k])});
  _parsedMembers=result;
  return result;
}

function genN(g){var n=['','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ','дёғ','е…«','д№қ','еҚҒ'];if(g<=10)return n[g];if(g<20)return 'еҚҒ'+n[g-10];if(g===20)return 'дәҢеҚҒ';var t=Math.floor(g/10),u=g%10;var tn=['','','дәҢеҚҒ','дёүеҚҒ','еӣӣеҚҒ','дә”еҚҒ','е…ӯеҚҒ','дёғеҚҒ','е…«еҚҒ','д№қеҚҒ'];return(tn[t]||t+'еҚҒ')+(u?n[u]:'')}
function toast(m){var e=document.getElementById('toast');e.innerHTML=m;e.classList.add('show');setTimeout(function(){e.classList.remove('show')},2500)}
function nId(){if(!D.mem.length)return'G001';var mx=0;D.mem.forEach(function(m){var n=parseInt(m.id.replace(/\D/g,''))||0;if(n>mx)mx=n});return'G'+String(mx+1).padStart(3,'0')}
function find(id){for(var i=0;i<D.mem.length;i++){if(D.mem[i].id===id)return D.mem[i]}return null}
function getSp(m){if(!m.sp||!m.sp[0])return null;return find(m.sp[0])}
function getCh(m){var c=[];D.mem.forEach(function(x){if(x.fa===m.id||x.mo===m.id)c.push(x)});c.sort(function(a,b){return(a.od||99)-(b.od||99)});return c}
function getPar(m,g){var p=g==='m'?m.fa:m.mo;if(!p)return null;return find(p)}
function nCN(n){return['','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ','дёғ','е…«','д№қ','еҚҒ'][n]||n}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ==================== Tree Rendering ====================
function renderTree(){

  var el=document.getElementById('treeContainer');
  var tt=D.set.tt||'е®¶и°ұ';
  document.getElementById('ttl').textContent=tt;
  document.getElementById('printTitle').textContent=tt+'ж—Ҹи°ұ';
  var sub=D.set.fm?(D.set.fm+'ж°Ҹ'):'';sub+=D.set.hl?' В· '+D.set.hl+'е Ӯ':'';sub+=D.set.wd?' В· '+D.set.wd+'йғЎжңӣ':'';
  document.getElementById('printSubtitle').textContent=sub||'дё–д»Јдј жүҝ В· жһқз№ҒеҸ¶иҢӮ';
  if(!D.mem.length){
    el.innerHTML='<div class="tree-hint"><p><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3L4 9v12h16V9l-8-6z"/><path d="M9 21v-6h6v6"/></svg></span> ејҖе§Ӣжһ„е»әдҪ зҡ„е®¶и°ұ</p><p style="margin-top:12px">зӮ№еҮ»дёӢж–№жҢүй’®ж·»еҠ <em>е§ӢзҘ–</em></p><p style="margin-top:16px"><button class="btn btn-primary" onclick="addRoot()"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span> ж·»еҠ е§ӢзҘ–</button></p><p style="margin-top:20px;font-size:.8rem;color:var(--sub-light)">д№ҹеҸҜд»Ҙз”Ё AI еҠ©жүӢ <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span> и§Јжһҗж–ҮжЎЈиҮӘеҠЁеҪ•е…Ҙ</p></div>';
    return;
  }
  var roots=[];
  D.mem.forEach(function(m){if(!m.fa&&!m.mo)roots.push(m)});
  roots.sort(function(a,b){return a.gen-b.gen});
  var h='<div class="tree-root">';
  roots.forEach(function(r){h+=renderFamily(r)});
  h+='</div>';
  h+='<div style="text-align:center;padding:8px 0 4px;font-size:.75rem;color:var(--sub-light)">Shift + жӢ–жӢҪеҸҜз§»еҠЁиҠӮзӮ№дҪҚзҪ®</div>';
  el.innerHTML=h;
}

function renderFamily(m){
  var ch=getCh(m),sp=getSp(m);
  var isCollapsed=_collapsed.has(m.id);
  var hasKids=ch.length>0&&!isCollapsed;
  var cls='tree-branch'+(hasKids?' has-children':'');
  var s='<div class="'+cls+'">';
  s+='<div class="tree-node-wrap"><div class="couple">';
  s+=renderNode(m,ch.length>0,isCollapsed);
  if(sp)s+='<div class="spouse-line"></div>'+renderNode(sp,false,false,m.id);
  s+='</div></div>';
  if(hasKids){
    s+='<div class="tree-children">';
    ch.forEach(function(c){s+=renderFamily(c)});
    s+='</div>';
  }
  s+='</div>';
  return s;
}
function handleNodeKey(e,id){if(e.key==='Enter')selectNode(id)}
function renderNode(m,hasCh,isCollapsed,familyId){
  var dragId=familyId||m.id;
  var tf=(m.ox||m.oy)?' style="transform:translate('+(m.ox||0)+'px,'+(m.oy||0)+'px)"':'';
  return '<div class="node '+(m.g==='male'?'male':'female')+(selectedId===m.id?' selected':'')+'" data-id="'+dragId+'"'+tf+' tabindex="0" onclick="selectNode(\''+m.id+'\')" onkeydown="handleNodeKey(event,\''+m.id+'\')">'
    +'<div class="node-gen">'+genN(m.gen)+'дё–</div>'
    +'<div class="name">'+esc(m.name)+'</div>'
    +'<div class="info">'+(m.bi?(m.bi+(m.de?'вҖ”'+m.de:'')):(m.de?m.de:''))+'</div>'
    +(hasCh?'<button class="collapse-toggle" onclick="toggleCollapse(\''+m.id+'\',event)" title="'+(isCollapsed?'еұ•ејҖ':'ж”¶иө·')+'">'+(isCollapsed?'+':'вҲ’')+'</button>':'')
    +'<button class="quick-add" onclick="event.stopPropagation();quickAddChild(\''+m.id+'\')" title="ж·»еҠ еӯҗеҘі">+</button></div>';
}

// ==================== Node Selection ====================
function selectNode(id){
  selectedId=id;
  renderTree();
  showDetailPanel(id);
}
function closeSidePanel(){
  selectedId=null;
  document.getElementById('sidePanel').classList.add('collapsed');
  renderTree();
}
function showDetailPanel(id){
  var m=find(id);
  if(!m)return;
  document.getElementById('sidePanel').classList.remove('collapsed');
  var p=document.getElementById('panelContent');
  var h='<div class="panel-header"><h3>'+esc(m.name)+'</h3><button class="close-btn" onclick="closeSidePanel()">&times;</button></div>';
  h+='<div class="panel-tabs"><button class="on" onclick="swTab(this,\'detail\')">иҜҰжғ…</button><button onclick="swTab(this,\'edit\')">зј–иҫ‘</button><button onclick="swTab(this,\'record\')">йҪҝеҪ•</button><button onclick="swTab(this,\'events\')">дәӢд»¶</button></div>';
  h+='<div class="panel-body" id="tabCt"></div>';
  p.innerHTML=h;
  showDetail(m);
}
function swTab(btn,tab){
  document.querySelectorAll('.panel-tabs button').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  var m=find(selectedId);
  if(!m)return;
  if(tab==='detail')showDetail(m);
  else if(tab==='edit')showEdit(m);
  else if(tab==='record')showRecord(m);
  else if(tab==='events')showEvents(m);
}

function saveEdit(id){
  var m=find(id);
  if(!m)return;
  var nm=document.getElementById('ed-nm').value.trim();
  if(!nm){toast('иҜ·еЎ«еҶҷе§“еҗҚ');return}
  var oldSp=m.sp&&m.sp[0]||null;
  m.name=nm;m.cy=document.getElementById('ed-cy').value.trim();
  m.g=document.getElementById('ed-g').value;m.gen=parseInt(document.getElementById('ed-gen').value);
  m.bi=document.getElementById('ed-bi').value.trim();m.de=document.getElementById('ed-de').value.trim();
  m.fa=document.getElementById('ed-fa').value||null;m.mo=document.getElementById('ed-mo').value||null;
  var nsp=document.getElementById('ed-sp').value||null;
  m.sp=nsp?[nsp]:[];
  m.od=document.getElementById('ed-od').value?parseInt(document.getElementById('ed-od').value):null;
  m.bu=document.getElementById('ed-bu').value.trim();m.ph=document.getElementById('ed-ph').value.trim();
  m.nt=document.getElementById('ed-nt').value.trim();
  if(oldSp&&oldSp!==nsp){var os=find(oldSp);if(os)os.sp=os.sp.filter(function(s){return s!==id})}
  if(nsp){var ns=find(nsp);if(ns&&ns.sp.indexOf(id)<0)ns.sp.push(id)}
  saveData();renderTree();showDetail(m);toast('е·Ідҝқеӯҳ');
}

function addSpouse(id){

function addParent(id){
  var m=find(id);
  if(!m)return;
  var fa=getPar(m,'m'),mo=getPar(m,'f');
  var choices=[];
  if(!fa)choices.push('зҲ¶дәІ');
  if(!mo)choices.push('жҜҚдәІ');
  if(!choices.length){toast('зҲ¶жҜҚдҝЎжҒҜе·Іе®Ңж•ҙ');return}
  var type=prompt('ж·»еҠ  '+choices.join(' жҲ– ')+'пјҹ(1='+choices[0]+(choices[1]?' 2='+choices[1]:'')+':','1');
  if(!type)return;
  var isFather=(type==='1'&&choices[0]==='зҲ¶дәІ')||(type==='2'&&choices[1]==='зҲ¶дәІ');
  var isMother=(type==='1'&&choices[0]==='жҜҚдәІ')||(type==='2'&&choices[1]==='жҜҚдәІ');
  if(!isFather&&!isMother)return;
  var nm=prompt(isFather?'зҲ¶дәІе§“еҗҚ:':'жҜҚдәІе§“еҗҚ:');
  if(!nm||!nm.trim())return;
  var p={id:nId(),name:nm.trim(),cy:'',g:isFather?'male':'female',gen:m.gen-1,bi:'',de:'',bu:'',fa:null,mo:null,sp:[],od:null,ph:'',nt:''};
  if(isFather)m.fa=p.id;else m.mo=p.id;
  D.mem.push(p);saveData();renderTree();selectNode(m.id);toast((isFather?'зҲ¶дәІ':'жҜҚдәІ')+'е·Іж·»еҠ ');
}
var _lastDeleted=null;
function delM(id){
  if(!confirm('зЎ®е®ҡеҲ йҷӨжӯӨдәәпјҹ'))return;
  var m=find(id);
  if(m)_lastDeleted=JSON.parse(JSON.stringify(m));
  D.mem=D.mem.filter(function(m){return m.id!==id});
  D.mem.forEach(function(m){if(m.fa===id)m.fa=null;if(m.mo===id)m.mo=null;m.sp=m.sp.filter(function(s){return s!==id})});
  if(selectedId===id)selectedId=null;
  saveData();renderTree();closeSidePanel();
  toast('е·ІеҲ йҷӨ В· 3з§’еҶ…еҸҜж’Өй”Җ');
  setTimeout(function(){_lastDeleted=null},3000);
}
function undoDelete(){
  if(!_lastDeleted){toast('жІЎжңүеҸҜж’Өй”Җзҡ„еҲ йҷӨ');return}
  D.mem.push(_lastDeleted);saveData();renderTree();
  toast('<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span> е·ІжҒўеӨҚ '+_lastDeleted.name);_lastDeleted=null;

// ==================== Document Parsing ====================
async function parseDoc(el){
  var f=el.files[0];if(!f)return;el.value='';
  addMsg('ai','и§Јжһҗ: '+f.name+'...');
  var text='';
  try{
    if(f.name.endsWith('.pdf')){text=await parsePDF(f)}
    else if(f.name.endsWith('.docx')){text=await parseWord(f)}
    else{addMsg('ai','д»…ж”ҜжҢҒ .pdf/.docx');return}
  }catch(e){addMsg('ai','й”ҷиҜҜ: '+e.message);return}
  if(!text){addMsg('ai','жңӘжҸҗеҸ–еҲ°ж–Үжң¬');return}
  addMsg('ai','жҸҗеҸ–'+text.length+'еӯ—пјҢAI и§Јжһҗдёӯ...');
  var sys='д»Һж–ҮжЎЈжҸҗеҸ–е®¶ж—ҸжҲҗе‘ҳгҖӮиҝ”еӣһ JSON ж•°з»„пјҢжҜҸдәәеҗ«: name,cy(еӯ—),g(з”·/еҘі),gen(иҫҲеҲҶж•°еӯ—),bi(еҮәз”ҹе№ҙ),de(еҺ»дё–е№ҙ),bu(и‘ӯең°),fa(зҲ¶еҗҚ),mo(жҜҚеҗҚ),od(жҺ’иЎҢж•°еӯ—),nt(еӨҮжіЁ)гҖӮеҸӘиҝ”еӣһ JSON ж•°з»„пјҢдёҚиҰҒе…¶д»–ж–Үеӯ—гҖӮ';
  var msgs=[{role:'system',content:sys},{role:'user',content:text.substring(0,8000)}];
  var ans=await callLLM(msgs);
  if(!ans)return;
  try{
    var jm=ans.match(/\[[\s\S]*\]/);
    if(!jm){addMsg('ai','и§ЈжһҗеӨұиҙҘпјҢжңӘжүҫеҲ° JSON');return}
    var ms2=JSON.parse(jm[0]);
    var ad=0;
    ms2.forEach(function(m){
      if(!m.name)return;
      m.id=nId();m.gen=parseInt(m.gen)||3;m.od=m.od?parseInt(m.od):null;
      m.g=(m.g==='з”·')?'male':'female';m.sp=[];m.ph='';
      m.cy=m.cy||'';m.bi=m.bi||'';m.de=m.de||'';m.bu=m.bu||'';m.nt=m.nt||'';
      if(m.fa){var f2=D.mem.find(function(x){return x.name===m.fa});m.fa=f2?f2.id:null}
      if(m.mo){var m2=D.mem.find(function(x){return x.name===m.mo});m.mo=m2?m2.id:null}
      D.mem.push(m);ad++
    });
    saveData();renderTree();
    addMsg('ai','<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span> еҪ•е…Ҙ '+ad+' дәәпјҒ');
  }catch(e){addMsg('ai','и§ЈжһҗеӨұиҙҘ: '+e.message)}
}

async function parsePDF(f){
  if(typeof pdfjsLib==='undefined'){
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  var buf=await f.arrayBuffer();
  var pdf=await pdfjsLib.getDocument({data:buf}).promise;
  var text='';
  for(var i=1;i<=pdf.numPages;i++){var page=await pdf.getPage(i);var c=await page.getTextContent();text+=c.items.map(function(s){return s.str}).join('')+'\n'}
  return text;
}

async function parseWord(f){
  if(typeof mammoth==='undefined')await loadScript('https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js');
  var buf=await f.arrayBuffer();
  var r=await mammoth.extractRawText({arrayBuffer:buf});
  return r.value;
}

function loadScript(url){return new Promise(function(ok,no){var s=document.createElement('script');s.src=url;s.onload=ok;s.onerror=function(){no(new Error('еҠ иҪҪеӨұиҙҘ'))};document.head.appendChild(s)})}

async function checkGrammar(){
  if(!D.mem.length){addMsg('ai','жҡӮж— ж•°жҚ®');return}
  addMsg('ai','жЈҖжҹҘдёӯ...');

    // Orphan references
    if(m.fa&&!find(m.fa))issues.push('<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span> '+m.name+' зҡ„зҲ¶дәІеј•з”Ёе·ІеӨұж•Ҳ');
    if(m.mo&&!find(m.mo))issues.push('<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span> '+m.name+' зҡ„жҜҚдәІеј•з”Ёе·ІеӨұж•Ҳ');
    // Self reference
    if(m.fa===m.id)issues.push('<span class="dot" style="background:#ef4444"></span> '+m.name+' зҡ„зҲ¶дәІжҳҜиҮӘе·ұ');
    if(m.mo===m.id)issues.push('<span class="dot" style="background:#ef4444"></span> '+m.name+' зҡ„жҜҚдәІжҳҜиҮӘе·ұ');

    if(m.sp&&m.sp[0]===m.id)issues.push('<span class="dot" style="background:#ef4444"></span> '+m.name+' зҡ„й…ҚеҒ¶жҳҜиҮӘе·ұ');
    // Generation mismatch
    if(m.fa){var fa=find(m.fa);if(fa&&fa.gen>=m.gen)issues.push('<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span> '+m.name+'(з¬¬'+m.gen+'дё–)зҡ„иҫҲеҲҶдёҚй«ҳдәҺзҲ¶дәІ'+fa.name+'(з¬¬'+fa.gen+'дё–)');}
    // Missing name
    if(!m.name||m.name.length<1)issues.push('<span class="dot" style="background:#ef4444"></span> зјәе°‘е§“еҗҚзҡ„и®°еҪ• (ID:'+m.id+')');
  });
  if(issues.length){
    addMsg('ai','<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg></span> жң¬ең°жЈҖжҹҘеҸ‘зҺ° '+issues.length+' дёӘй—®йўҳпјҡ\n\n'+issues.join('\n'));
  }else{
    addMsg('ai','<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span> жң¬ең°жЈҖжҹҘйҖҡиҝҮпјҢжңӘеҸ‘зҺ°й—®йўҳ');
  }
  // Then AI check
  var text=D.mem.map(function(m){return m.name+',з¬¬'+genN(m.gen)+'дё–,'+(m.bi||'?')+'вҖ”'+(m.de||'?')}).join('\n');
  var msgs=[{role:'system',content:'жЈҖжҹҘе®¶и°ұж•°жҚ®й—®йўҳ: й”ҷеҲ«еӯ—гҖҒе№ҙд»ҪйҖ»иҫ‘гҖҒиҫҲеҲҶй”ҷиҜҜгҖӮз®ҖжҙҒеҲ—еҮәй—®йўҳгҖӮ'},{role:'user',content:text}];
  var ans=await callLLM(msgs);
  if(ans)addMsg('ai','\n<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg></span> AI еҲҶжһҗпјҡ\n'+ans);

// ==================== Drag & Drop ====================
var _dragFrom=null,_dragLine=null,_dragMoved=false;
var _posDrag=null,_posDragging=false; // position drag state
function initDrag(){
  document.addEventListener("mousedown",function(e){
    var node=e.target.closest(".node");
    if(!node||e.target.closest(".quick-add")||e.target.closest(".collapse-toggle"))return;
    var id=node.dataset.id;if(!id)return;
    if(e.shiftKey){
      var m=find(id);if(!m)return;
      _posDrag={id:id,startX:e.clientX,startY:e.clientY,ox:m.ox||0,oy:m.oy||0};
      _posDragging=true;
      node.style.cursor='grabbing';
      node.style.zIndex='9999';
      e.preventDefault();return;
    }
    _dragFrom=id;_dragMoved=false;node.classList.add("dragging");
    _dragLine=document.createElementNS("http://www.w3.org/2000/svg","svg");
    _dragLine.classList.add("drag-line");
    _dragLine.setAttribute("width",window.innerWidth);
    _dragLine.setAttribute("height",window.innerHeight);
    var r=node.getBoundingClientRect();
    _dragLine.innerHTML="<line x1=\""+(r.left+r.width/2)+"\" y1=\""+(r.top+r.height/2)+"\" x2=\""+e.clientX+"\" y2=\""+e.clientY+"\"/>";
    document.body.appendChild(_dragLine);
    e.preventDefault();
  });
  document.addEventListener("mousemove",function(e){
    if(_posDrag){
      var m=find(_posDrag.id);if(!m)return;
      var node=document.querySelector('.node[data-id="'+_posDrag.id+'"]');
      m.ox=_posDrag.ox+(e.clientX-_posDrag.startX);
      m.oy=_posDrag.oy+(e.clientY-_posDrag.startY);
      if(node)node.style.transform='translate('+m.ox+'px,'+m.oy+'px)';
      return;
    }
    if(!_dragFrom||!_dragLine)return;
    _dragMoved=true;
    var ln=_dragLine.querySelector("line");
    var n=document.querySelector(".node[data-id=\""+_dragFrom+"\"]");
    if(n&&ln){var r=n.getBoundingClientRect();ln.setAttribute("x1",r.left+r.width/2);ln.setAttribute("y1",r.top+r.height/2);ln.setAttribute("x2",e.clientX);ln.setAttribute("y2",e.clientY)}
    document.querySelectorAll(".node.drag-over").forEach(function(el){el.classList.remove("drag-over")});
    var tgt=document.elementFromPoint(e.clientX,e.clientY);
    if(tgt){var tn=tgt.closest(".node");if(tn&&tn.dataset.id&&tn.dataset.id!==_dragFrom)tn.classList.add("drag-over")}
  });
  document.addEventListener("mouseup",function(e){
    if(_posDrag){
      saveData();
      var node=document.querySelector('.node[data-id="'+_posDrag.id+'"]');
      if(node){node.style.cursor='';node.style.zIndex=''}
      _posDrag=null;_posDragging=false;return;
    }
    document.querySelectorAll(".node.dragging").forEach(function(el){el.classList.remove("dragging")});
    document.querySelectorAll(".node.drag-over").forEach(function(el){el.classList.remove("drag-over")});
    if(_dragLine){_dragLine.remove();_dragLine=null}
    var tgt=document.elementFromPoint(e.clientX,e.clientY);
    if(tgt){var tn=tgt.closest(".node");if(tn&&tn.dataset.id&&tn.dataset.id!==_dragFrom)showRelPicker(_dragFrom,tn.dataset.id)}
    _dragFrom=null;
  });
  document.addEventListener("click",function(e){
    if(_dragMoved){e.stopPropagation();e.preventDefault();_dragMoved=false}
  },true);
}

function showRelPicker(fromId,toId){
  var from=find(fromId),to=find(toId);
  if(!from||!to)return;
  window._relA=fromId;window._relB=toId;
  var opts=[
    {mode:"a-parent",label:"вҶ‘ "+esc(from.name)+" жҳҜ "+esc(to.name)+" зҡ„зҲ¶/жҜҚ"},
    {mode:"a-child",label:"вҶ“ "+esc(from.name)+" жҳҜ "+esc(to.name)+" зҡ„еӯҗеҘі"},
    {mode:"spouse",label:"вҶ” й…ҚеҒ¶е…ізі»"},
    {mode:"b-parent",label:"вҶ‘ "+esc(to.name)+" жҳҜ "+esc(from.name)+" зҡ„зҲ¶/жҜҚ"}
  ];
  var h="<h3>и®ҫзҪ®е…ізі»</h3>";
  h+="<p style='text-align:center;margin-bottom:20px;font-size:.9rem'><b>"+esc(from.name)+"</b> вҶ’ <b>"+esc(to.name)+"</b></p>";
  h+="<div style='display:flex;flex-direction:column;gap:10px'>";
  opts.forEach(function(o){
    h+="<button class='btn btn-ghost' onclick='doSetRel(\""+o.mode+"\")'>"+o.label+"</button>";
  });
  h+="<button class='btn btn-danger' onclick='closeModal()'>еҸ–ж¶Ҳ</button>";
  h+="</div>";
  document.getElementById("modalBody").innerHTML=h;openModal();
}
function doSetRel(mode){
  var a=find(window._relA),b=find(window._relB);
  if(!a||!b)return;
  if(mode==="a-parent"){
    if(a.g==="male")b.fa=a.id;else b.mo=a.id;
    cascadeGen(b,a.gen+1);
  }else if(mode==="a-child"){
    if(b.g==="male")a.fa=b.id;else a.mo=b.id;
    cascadeGen(a,b.gen+1);
  }else if(mode==="b-parent"){
    if(b.g==="male")a.fa=b.id;else a.mo=b.id;
    cascadeGen(a,b.gen+1);
  }else if(mode==="spouse"){
    a.sp=[b.id];b.sp=[a.id];
    if(a.gen!==b.gen)cascadeGen(b,a.gen);
  }
  saveData();renderTree();closeModal();toast("е…ізі»е·Іи®ҫзҪ®");
}
function cascadeGen(m,newGen){
  if(m.gen===newGen)return;
  var oldGen=m.gen;m.gen=newGen;
  var diff=newGen-oldGen;
  getCh(m).forEach(function(c){cascadeGen(c,c.gen+diff)});
}


function initTouchZoom(){
  var panel=document.getElementById('treePanel');
  if(!panel)return;
  
  // Pinch zoom
  panel.addEventListener('touchstart',function(e){
    if(e.touches.length===2){
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      _pinchStart={dist:Math.sqrt(dx*dx+dy*dy),zoom:_zoom,
        cx:(e.touches[0].clientX+e.touches[1].clientX)/2,
        cy:(e.touches[0].clientY+e.touches[1].clientY)/2};
      e.preventDefault();
    }else if(e.touches.length===1){
      _lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};
    }
  },{passive:false});
  
  panel.addEventListener('touchmove',function(e){
    if(e.touches.length===2&&_pinchStart){
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      var dist=Math.sqrt(dx*dx+dy*dy);
      var newZoom=Math.max(0.3,Math.min(5,_pinchStart.zoom*(dist/_pinchStart.dist)));
      // Zoom toward pinch center
      var scale=newZoom/_zoom;
      _panX=_pinchStart.cx-scale*(_pinchStart.cx-_panX);
      _panY=_pinchStart.cy-scale*(_pinchStart.cy-_panY);
      _zoom=newZoom;
      applyTransform();
      e.preventDefault();
    }else if(e.touches.length===1&&_lastTouch&&_zoom>1.05){
      var dx=e.touches[0].clientX-_lastTouch.x;
      var dy=e.touches[0].clientY-_lastTouch.y;
      _panX+=dx;_panY+=dy;
      _lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};
      applyTransform();
      e.preventDefault();
    }
  },{passive:false});
  
  panel.addEventListener('touchend',function(e){
    if(e.touches.length<2)_pinchStart=null;
    if(e.touches.length===0)_lastTouch=null;
  });
  
  // Desktop: wheel zoom
  panel.addEventListener('wheel',function(e){
    e.preventDefault();
    var factor=e.deltaY<0?1.1:0.9;
    var rect=panel.getBoundingClientRect();
    var cx=e.clientX-rect.left;
    var cy=e.clientY-rect.top;
    var newZoom=Math.max(0.3,Math.min(5,_zoom*factor));
    var scale=newZoom/_zoom;
    _panX=cx-scale*(cx-_panX);
    _panY=cy-scale*(cy-_panY);
    _zoom=newZoom;
    applyTransform();
  },{passive:false});
  
  // Desktop: mouse drag to pan
  var _dragging=false,_dragStart={x:0,y:0};
  panel.addEventListener('mousedown',function(e){
    if(e.target.closest('.node,.quick-add,button,a,input,select,textarea'))return;
    _dragging=true;
    _dragStart={x:e.clientX-_panX,y:e.clientY-_panY};
    panel.style.cursor='grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!_dragging)return;
    _panX=e.clientX-_dragStart.x;
    _panY=e.clientY-_dragStart.y;
    applyTransform();
  });
  document.addEventListener('mouseup',function(){
    if(_dragging){_dragging=false;panel.style.cursor=''}
  });
}

function tplVerticalTree(css,tt,sub){
  var h='<div class="title">'+esc(tt)+'</div>';
  if(sub)h+='<div class="subtitle">'+esc(sub)+'</div>';
  
  function findRoots(){var roots=[];D.mem.forEach(function(m){if(!m.fa&&!m.mo)roots.push(m)});return roots}
  function getCh(m){return D.mem.filter(function(c){return c.fa===m.id||c.mo===m.id}).sort(function(a,b){return(a.od||99)-(b.od||99)})}
  function getSp(m){if(!m.sp||!m.sp.length)return null;return find(m.sp[0])}
  function find(id){return D.mem.find(function(m){return m.id===id})}
  
  function renderSubtree(m,depth){
    if(depth>8)return '<div class="tree-node"><div class="nm">'+esc(m.name)+'</div></div>';
    var sp=getSp(m);
    var s='<div class="child-unit">';
    s+='<div class="couple-wrap">';
    s+='<div class="tree-node"><div class="nm">'+esc(m.name)+'</div><div class="gi">'+genN(m.gen)+'дё–</div></div>';
    if(sp)s+='<span class="spouse-line"></span><div class="tree-node"><div class="nm">'+esc(sp.name)+'</div></div>';
    s+='</div>';
    var ch=getCh(m);
    if(ch.length){
      s+='<span class="v-line"></span>';
      s+='<div class="h-line-wrap"></div>';
      s+='<div class="children-wrap">';
      ch.forEach(function(c){s+=renderSubtree(c,depth+1)});
      s+='</div>';
    }
    s+='</div>';
    return s;
  }
  
  var roots=findRoots();
  if(roots.length===1){
    h+=renderSubtree(roots[0],0);
  }else{
    h+='<div style="text-align:center">';
    roots.forEach(function(r){h+=renderSubtree(r,0)});
    h+='</div>';
  }
  return h;
}

function tplFiveGen(css,tt,sub){
  var h='<div class="title">'+esc(tt)+'</div>';
  if(sub)h+='<div class="subtitle">'+esc(sub)+'</div>';
  h+='<p style="text-align:center;color:#666;font-size:10pt;margin-bottom:16px">дә”дё–дёҖжҸҗ В· ж¬§йҳідҝ®ејҸ</p>';
  
  var mx=0;D.mem.forEach(function(m){if(m.gen>mx)mx=m.gen});
  
  function find(id){return D.mem.find(function(m){return m.id===id})}
  function getSp(m){if(!m.sp||!m.sp.length)return null;return find(m.sp[0])}
  function getCh(m){return D.mem.filter(function(c){return c.fa===m.id||c.mo===m.id}).sort(function(a,b){return(a.od||99)-(b.od||99)})}
  
  // Group into 5-generation blocks
  for(var startGen=1;startGen<=mx;startGen+=4){
    var endGen=Math.min(startGen+4,mx);
    var blockMembers=[];
    D.mem.forEach(function(m){if(m.gen>=startGen&&m.gen<=endGen)blockMembers.push(m)});
    if(!blockMembers.length)continue;
    
    h+='<div class="gen-title">з¬¬'+genN(startGen)+'дё– вҖ” з¬¬'+genN(endGen)+'дё–</div>';
    h+='<table class="five-gen-table"><tr>';
    for(var g=startGen;g<=endGen;g++)h+='<th>з¬¬'+genN(g)+'дё–</th>';
    h+='</tr>';
    
    // Find roots of this block (people at startGen with no parent in block)
    var blockRoots=blockMembers.filter(function(m){return m.gen===startGen});
    
    blockRoots.forEach(function(root){
      h+='<tr>';
      for(var g=startGen;g<=endGen;g++){
        h+='<td>';
        if(g===startGen){
          var sp=getSp(root);
          h+='<b>'+esc(root.name)+'</b>';
          if(sp)h+=' й…Қ'+esc(sp.name);
        }else{
          // Find descendants at this generation
          var descs=[];
          function findDesc(parent,depth){
            if(depth>10)return;
            var ch=getCh(parent);
            ch.forEach(function(c){
              if(c.gen===g)descs.push(c);
              else if(c.gen<g)findDesc(c,depth+1);
            });
          }
          findDesc(root,0);
          if(descs.length){
            descs.forEach(function(d,di){
              if(di>0)h+='<br>';
              var sp=getSp(d);
              h+='<b>'+esc(d.name)+'</b>';
              if(sp)h+=' й…Қ'+esc(sp.name);
            });
          }
        }
        h+='</td>';
      }
      h+='</tr>';
    });
    h+='</table>';
  }
  return h;
}

function tplRecord(css,tt,sub){
  var h='<div class="title">'+esc(tt)+'</div>';
  if(sub)h+='<div class="subtitle">'+esc(sub)+'</div>';
  h+='<p style="text-align:center;color:#666;font-size:10pt;margin-bottom:16px">йҪҝеҪ• В· жҢүдё–д»ЈеҲҶз»„</p>';
  
  var mx=0;D.mem.forEach(function(m){if(m.gen>mx)mx=m.gen});
  function find(id){return D.mem.find(function(m){return m.id===id})}
  function getSp(m){if(!m.sp||!m.sp.length)return null;return find(m.sp[0])}
  function getCh(m){return D.mem.filter(function(c){return c.fa===m.id||c.mo===m.id}).sort(function(a,b){return(a.od||99)-(b.od||99)})}
  
  for(var g=1;g<=mx;g++){
    var ms=[];D.mem.forEach(function(m){if(m.gen===g)ms.push(m)});
    if(!ms.length)continue;
    ms.sort(function(a,b){return(a.od||99)-(b.od||99)});
    h+='<div class="gen-title">з¬¬'+genN(g)+'дё– ('+ms.length+'дәә)</div>';
    ms.forEach(function(m){
      var sp=getSp(m),ch=getCh(m);
      var sons=[],dgs=[];ch.forEach(function(c){if(c.g==='male')sons.push(c);else dgs.push(c)});
      var t='';
      if(m.g==='male'){
        if(g===1)t+='и®і'+m.name+'пјҢ';
        else{var o='';if(m.od===1)o='й•ҝжҲҝ';else if(m.od===2)o='ж¬ЎжҲҝ';t+=(o?o+' ':'')+m.name+'пјҢ'}
      }else{t+=m.name+'пјҢ'}
      t+=m.cy?'еӯ—'+m.cy+'гҖӮ':'гҖӮ';
      if(m.bi)t+='з”ҹдәҺе…¬е…ғ'+m.bi+'е№ҙ';
      if(m.de){t+='пјҢеҚӢдәҺ'+m.de+'е№ҙ';var a=parseInt(m.de)-parseInt(m.bi);if(a>0)t+='пјҢдә«е№ҙ'+a+'еІҒ'}
      t+='гҖӮ';
      if(sp){t+='й…Қ'+sp.name;if(sp.bi)t+='пјҢз”ҹдәҺ'+sp.bi+'е№ҙ';t+='гҖӮ'}
      if(sons.length){t+='еӯҗ'+nCN(sons.length)+'пјҡ';sons.forEach(function(s,i){if(i>0)t+='пјҢ';t+=(i===0?'й•ҝ':'ж¬Ў')+s.name});t+='гҖӮ'}
      if(dgs.length){t+='еҘі'+nCN(dgs.length)+'пјҡ';dgs.forEach(function(d,i){if(i>0)t+='пјҢ';t+=d.name});t+='гҖӮ'}
      if(m.bu)t+='и‘ӯдәҺ'+m.bu+'гҖӮ';
      h+='<div class="person"><div class="person-name">'+esc(m.name)+'</div><div class="person-info">'+t+'</div></div>';
    });
  }
  return h;
}

function tplPyramid(css,tt,sub){
  var h='<div class="title">'+esc(tt)+'</div>';
  if(sub)h+='<div class="subtitle">'+esc(sub)+'</div>';
  h+='<p style="text-align:center;color:#666;font-size:10pt;margin-bottom:16px">е®қеЎ”ејҸ В· е§ӢзҘ–еұ…дёҠ</p>';
  
  function find(id){return D.mem.find(function(m){return m.id===id})}
  function getSp(m){if(!m.sp||!m.sp.length)return null;return find(m.sp[0])}
  function getCh(m){return D.mem.filter(function(c){return c.fa===m.id||c.mo===m.id}).sort(function(a,b){return(a.od||99)-(b.od||99)})}
  
  var mx=0;D.mem.forEach(function(m){if(m.gen>mx)mx=m.gen});
  var roots=[];D.mem.forEach(function(m){if(!m.fa&&!m.mo)roots.push(m)});
  
  h+='<div class="pyramid">';
  for(var g=1;g<=mx;g++){
    var ms=[];D.mem.forEach(function(m){if(m.gen===g)ms.push(m)});
    if(!ms.length)continue;
    h+='<div class="pyramid-level">';
    ms.forEach(function(m){
      var sp=getSp(m);
      h+='<span class="tree-node"><span class="nm">'+esc(m.name)+'</span>';
      if(sp)h+='<br><span style="font-size:8pt;color:#999">й…Қ'+esc(sp.name)+'</span>';
      h+='</span>';
    });
    h+='</div>';
  }
  h+='</div>';
  return h;
}

// ==================== Search ====================
function doSearch(q){
  q=q.trim().toLowerCase();
  if(!q){renderTree();return}
  var results=[];
  D.mem.forEach(function(m){
    if(m.name.toLowerCase().indexOf(q)>=0||(m.cy&&m.cy.toLowerCase().indexOf(q)>=0)||(m.nt&&m.nt.toLowerCase().indexOf(q)>=0))results.push(m);
  });
  var el=document.getElementById('treeContainer');
  if(!results.length){el.innerHTML='<div class="tree-hint"><p><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg></span> жңӘжүҫеҲ°</p><p style="margin-top:12px">жІЎжңүжүҫеҲ°еҢ…еҗ«гҖҢ'+esc(q)+'гҖҚзҡ„жҲҗе‘ҳ</p></div>';return}
  var h='<div style="margin-bottom:16px;padding:12px 16px;background:var(--paper-alt);border-radius:var(--radius-md);border:1px solid var(--border)"><b>жҗңзҙўз»“жһңпјҡ</b>жүҫеҲ° '+results.length+' дәә</div>';
  results.forEach(function(m){
    h+='<div class="record-block" style="cursor:pointer" onclick="selectNode(\''+m.id+'\')">';
    h+='<div class="rec-name">'+esc(m.name)+' <span style="font-weight:400;color:var(--sub);font-size:.8rem">з¬¬'+genN(m.gen)+'дё–</span></div>';
    var sp=getSp(m);
    if(sp)h+='<div class="rec-text" style="text-indent:0">й…Қ: '+esc(sp.name)+'</div>';
    h+='</div>';
  });
  el.innerHTML=h;
}
